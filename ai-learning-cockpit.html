<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 学习驾驶舱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f0f2f5;--card:#ffffff;--card-hover:#f8f9ff;--border:#e0e4ef;--text:#1a1a2e;--text-dim:#6b7280;--accent:#667eea;--accent2:#764ba2;--green:#4caf50;--orange:#ff9800;--red:#f44336;--cyan:#00bcd4;--pink:#e91e63;--yellow:#f59e0b;--card-shadow:0 2px 12px rgba(0,0,0,0.06);--hover-shadow:0 8px 24px rgba(102,126,234,0.12);--scrollbar-track:#f0f2f5;--scrollbar-thumb:#c4c9e2}
[data-theme="dark"]{--bg:#0f0f1a;--card:#1a1a2e;--card-hover:#22223a;--border:#2a2a4a;--text:#e0e0e0;--text-dim:#8888aa;--card-shadow:0 4px 20px rgba(0,0,0,0.3);--hover-shadow:0 8px 32px rgba(102,126,234,0.2);--scrollbar-track:#1a1a2e;--scrollbar-thumb:#3a3a5a}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
body *{transition:background-color .3s,color .3s,border-color .3s,box-shadow .3s}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--scrollbar-track)}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:3px}

.theme-toggle{position:fixed;top:16px;right:16px;z-index:9999;width:44px;height:44px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--card-shadow)}
.theme-toggle:hover{border-color:var(--accent);transform:scale(1.08)}
.theme-toggle:active{transform:scale(.95)}

.dashboard{max-width:1600px;margin:0 auto;padding:24px}
header{text-align:center;margin-bottom:24px}
header h1{font-size:30px;background:linear-gradient(135deg,#667eea,#764ba2,#e91e63);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
header p{color:var(--text-dim);font-size:13px}

/* Tab System */
.tab-nav{display:flex;gap:6px;margin-bottom:24px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 20px;border:1.5px solid var(--border);border-radius:12px;background:var(--card);color:var(--text-dim);cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0;transition:all .3s}
.tab-btn:hover{border-color:var(--accent);color:var(--text)}
.tab-btn.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(102,126,234,.3)}

.tab-content{display:none;animation:fadeIn .4s ease}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:16px;padding:18px;border:1px solid var(--border);position:relative;overflow:hidden;transition:transform .2s,box-shadow .3s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--hover-shadow)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card:nth-child(1)::before{background:linear-gradient(90deg,#667eea,#764ba2)}
.stat-card:nth-child(2)::before{background:linear-gradient(90deg,#e65100,#ff9800)}
.stat-card:nth-child(3)::before{background:linear-gradient(90deg,#4caf50,#00bcd4)}
.stat-card:nth-child(4)::before{background:linear-gradient(90deg,#e91e63,#f44336)}
.stat-card:nth-child(5)::before{background:linear-gradient(90deg,#7b1fa2,#667eea)}
.stat-card:nth-child(6)::before{background:linear-gradient(90deg,#00bcd4,#4caf50)}
.stat-icon{font-size:22px;margin-bottom:6px}
.stat-value{font-size:30px;font-weight:800}
.stat-label{font-size:11px;color:var(--text-dim);margin-top:3px}

/* Chart Container */
.chart-row{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;margin-bottom:24px}
.chart-box{background:var(--card);border-radius:16px;padding:20px;border:1px solid var(--border)}
.chart-box h3{font-size:15px;margin-bottom:14px;color:var(--text)}
.chart-box svg{width:100%;height:auto}

/* Progress Section */
.progress-list{display:flex;flex-direction:column;gap:16px}
.progress-item{background:var(--card);border-radius:14px;padding:18px 20px;border:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.progress-icon{font-size:26px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:10px;flex-shrink:0}
.progress-info{flex:1;min-width:200px}
.progress-name{font-size:14px;font-weight:700;margin-bottom:6px}
.progress-bar-wrap{height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:5px;transition:width .8s cubic-bezier(.4,0,.2,1);min-width:0}
.progress-meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:11px;color:var(--text-dim)}
.progress-pct{font-size:14px;font-weight:700;min-width:44px;text-align:right}
.progress-click{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text-dim);cursor:pointer;font-size:12px;white-space:nowrap}
.progress-click:hover{border-color:var(--accent);color:var(--accent)}

/* Accordion */
.accordion{margin-bottom:12px}
.acc-header{background:var(--card);border-radius:14px;padding:16px 20px;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:14px;user-select:none;transition:all .2s}
.acc-header:hover{border-color:var(--accent);box-shadow:var(--hover-shadow)}
.acc-header .acc-icon{font-size:22px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:10px;flex-shrink:0}
.acc-header .acc-title{flex:1}
.acc-header .acc-title h4{font-size:14px;font-weight:700}
.acc-header .acc-title span{font-size:11px;color:var(--text-dim)}
.acc-arrow{font-size:12px;color:var(--text-dim);transition:transform .3s}
.acc-header.open .acc-arrow{transform:rotate(180deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1)}
.acc-body-inner{padding:14px 20px 20px;display:flex;flex-wrap:wrap;gap:10px}
.kp-tag{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);transition:all .2s}
.kp-tag:hover{transform:translateY(-1px);box-shadow:var(--hover-shadow)}
.kp-tag .kp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kp-tag[data-status="0"] .kp-dot{background:#9e9e9e}
.kp-tag[data-status="1"] .kp-dot{background:#2196f3}
.kp-tag[data-status="2"] .kp-dot{background:#4caf50}
.kp-tag[data-status="3"] .kp-dot{background:#f44336}
.kp-tag[data-status="0"]{color:#9e9e9e}
.kp-tag[data-status="1"]{color:#2196f3;border-color:#2196f355}
.kp-tag[data-status="2"]{color:#4caf50;border-color:#4caf5055}
.kp-tag[data-status="3"]{color:#f44336;border-color:#f4433655}

/* Resource Filter */
.resource-filter{margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.resource-filter label{font-size:13px;font-weight:600}
.resource-filter select{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer;outline:none}
.resource-filter select:focus{border-color:var(--accent)}
.resource-group{margin-bottom:18px}
.resource-group h4{font-size:14px;font-weight:700;margin-bottom:10px;padding-left:4px;display:flex;align-items:center;gap:8px}
.resource-group h4 .rg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.res-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border-radius:10px;border:1px solid var(--border);margin-bottom:8px;font-size:13px;transition:all .2s}
.res-item:hover{border-color:var(--accent);box-shadow:var(--hover-shadow)}
.res-item .res-src{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600;flex-shrink:0}
.res-src[data-source="bilibili"]{background:#fb729933;color:#fb7299}
.res-src[data-source="youtube"]{background:#ff000033;color:#ff0000}
.res-src[data-source="course"]{background:#4caf5033;color:#4caf50}
.res-item.hidden{display:none}

/* Table */
.record-table-wrap{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow-x:auto}
.record-table{width:100%;border-collapse:collapse;font-size:13px}
.record-table th{padding:14px 16px;text-align:left;font-weight:700;font-size:12px;color:var(--text-dim);border-bottom:1px solid var(--border);white-space:nowrap}
.record-table td{padding:12px 16px;border-bottom:1px solid var(--border)}
.record-table tr:last-child td{border-bottom:none}
.record-table tr:hover td{background:var(--card-hover)}
.status-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.status-badge.s-done{background:#4caf5022;color:#4caf50}
.status-badge.s-learning{background:#2196f322;color:#2196f3}
.status-badge.s-plan{background:#ff980022;color:#ff9800}
.record-hint{text-align:center;padding:16px;color:var(--text-dim);font-size:12px}

/* Weak Points */
.weak-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.weak-card{background:var(--card);border-radius:14px;padding:18px;border:1px solid #f4433644;border-left:4px solid #f44336;transition:transform .2s,box-shadow .3s}
.weak-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(244,67,54,.15)}
.weak-stage{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block;margin-bottom:8px;background:#f4433622;color:#f44336}
.weak-name{font-size:14px;font-weight:700;margin-bottom:6px}
.weak-desc{font-size:12px;color:var(--text-dim);line-height:1.5;margin-bottom:8px}
.weak-date{font-size:11px;color:var(--text-dim)}

/* Timeline */
.timeline{position:relative;padding-left:40px}
.timeline::before{content:'';position:absolute;left:18px;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#667eea,#764ba2,#e91e63,#ff9800,#4caf50,#2196f3,#42a5f5,#ab47bc,#f48fb1);border-radius:2px}
.tl-node{position:relative;margin-bottom:28px}
.tl-dot{position:absolute;left:-30px;top:4px;width:18px;height:18px;border-radius:50%;border:3px solid var(--bg);z-index:1}
.tl-card{background:var(--card);border-radius:14px;padding:16px 20px;border:1px solid var(--border);transition:all .2s}
.tl-card:hover{box-shadow:var(--hover-shadow);border-color:var(--accent)}
.tl-week{font-size:11px;font-weight:700;margin-bottom:4px}
.tl-name{font-size:15px;font-weight:800;margin-bottom:4px}
.tl-milestone{font-size:12px;color:var(--text-dim);line-height:1.5}
.tl-daily{font-size:11px;color:var(--text-dim);margin-top:4px}

/* Footer */
.footer{text-align:center;padding:32px 0 16px;color:var(--text-dim);font-size:13px}

/* Responsive */
@media(max-width:900px){
.chart-row{grid-template-columns:1fr}
.stats-grid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
}
@media(max-width:600px){
.dashboard{padding:14px}
header h1{font-size:22px}
.stat-value{font-size:24px}
.tab-btn{padding:8px 14px;font-size:12px}
.progress-item{flex-direction:column;align-items:flex-start}
.weak-grid{grid-template-columns:1fr}
.timeline{padding-left:32px}
.timeline::before{left:12px}
.tl-dot{left:-26px}
}
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="dashboard">
<header>
<h1>🚀 AI 学习驾驶舱</h1>
<p>从零到大模型 · 9大阶段 · 80+知识点 · 预计36-54周</p>
</header>

<!-- Tab Navigation -->
<nav class="tab-nav" id="tabNav">
<button class="tab-btn active" data-tab="overview">📊 总览</button>
<button class="tab-btn" data-tab="progress">📈 阶段进度</button>
<button class="tab-btn" data-tab="knowledge">📚 知识点详情</button>
<button class="tab-btn" data-tab="resource">🎓 课程资源</button>
<button class="tab-btn" data-tab="record">📝 学习记录</button>
<button class="tab-btn" data-tab="weak">⚠️ 薄弱点</button>
<button class="tab-btn" data-tab="timeline">🗓️ 时间线</button>
</nav>

<!-- ==================== TAB 1: 总览 ==================== -->
<div class="tab-content active" id="tab-overview">
<div class="stats-grid">
<div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-value" id="sv-stage">尚未开始</div><div class="stat-label">当前阶段</div></div>
<div class="stat-card"><div class="stat-icon">⏱️</div><div class="stat-value">0h</div><div class="stat-label">累计学习时长</div></div>
<div class="stat-card"><div class="stat-icon">📅</div><div class="stat-value">0</div><div class="stat-label">已学习天数</div></div>
<div class="stat-card"><div class="stat-icon">🔥</div><div class="stat-value">0h</div><div class="stat-label">今日学时</div></div>
<div class="stat-card"><div class="stat-icon">🔗</div><div class="stat-value">0天</div><div class="stat-label">连续学习</div></div>
<div class="stat-card"><div class="stat-icon">🏁</div><div class="stat-value">36-54周</div><div class="stat-label">距完成预估</div></div>
</div>

<div class="chart-row">
<div class="chart-box">
<h3>📈 每日学习时长趋势（近7天）</h3>
<svg viewBox="0 0 560 220" xmlns="http://www.w3.org/2000/svg">
<!-- Grid lines -->
<line x1="60" y1="30" x2="60" y2="180" stroke="var(--border)" stroke-width="0.5"/>

<!-- Y labels -->
<text x="50" y="184" fill="var(--text-dim)" font-size="10" text-anchor="end">0h</text>

<text x="105" y="200" fill="var(--text-dim)" font-size="10" text-anchor="middle">周一</text>

<text x="255" y="200" fill="var(--text-dim)" font-size="10" text-anchor="middle">周三</text>

</svg>
</div>
</div>
</div>

<!-- ==================== TAB 2: 阶段进度 ==================== -->
<div class="tab-content" id="tab-progress">
<div class="progress-list" id="progressList"></div>
</div>

<!-- ==================== TAB 3: 知识点详情 ==================== -->
<div class="tab-content" id="tab-knowledge">
<div id="accordionWrap"></div>
</div>

<!-- ==================== TAB 4: 课程资源 ==================== -->
<div class="tab-content" id="tab-resource">
<div class="resource-filter">
<label>🔍 筛选来源：</label>
<select id="resFilter" onchange="filterResources()">

<option value="bilibili">B站</option>

</select>
</div>

</div>

<!-- ==================== TAB 5: 学习记录 ==================== -->

</div>

<!-- ==================== TAB 7: 时间线 ==================== -->

<div class="timeline" id="timelineWrap"></div>
</div>

</div>

<script>
// ===== Reset localStorage for clean state (only on first load) =====
(function(){
  // Clear learning progress, knowledge point states
  localStorage.removeItem('ai-dash-progress');
  localStorage.removeItem('ai-dash-kp');
  // Keep theme setting
})();

// ===== Data =====
const stages = [
  {id:1,name:'数学基础',icon:'📐',color:'#ff9800',weeks:'1-6周',milestone:'掌握AI所需全部数学工具',daily:'1.5h/天',

// ===== Theme =====
function toggleTheme(){
  const html = document.documentElement;
  const cur = html.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('ai-dash-theme', next);
}
(function(){
  const saved = localStorage.getItem('ai-dash-theme');
  if(saved){
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '🌙' : '☀️';
  }
})();

// ===== Tab Switching =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function(){
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('tab-' + this.dataset.tab).classList.add('active');
  });
});

// ===== Stage Progress =====
function loadProgress(){
  const saved = JSON.parse(localStorage.getItem('ai-dash-progress') || '{}');
  return saved;
}
function saveProgress(p){
  localStorage.setItem('ai-dash-progress', JSON.stringify(p));
}
function renderProgress(){
  const prog = loadProgress();
  const wrap = document.getElementById('progressList');
  wrap.innerHTML = stages.map(s => {
    const pct = prog[s.id] || 0;
    return `<div class="progress-item">
      <div class="progress-icon" style="background:${s.color}22;color:${s.color}">${s.icon}</div>
      <div class="progress-info">
        <div class="progress-name">${s.icon} 阶段${s.id} · ${s.name}</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>
        <div class="progress-meta"><span>${s.weeks}</span><span>${pct}%</span></div>
      </div>
      <button class="progress-click" onclick="addProgress(${s.id})">+10%</button>
    </div>`;
  }).join('');
}
function addProgress(id){
  const prog = loadProgress();
  prog[id] = Math.min(100, (prog[id] || 0) + 10);
  saveProgress(prog);
  renderProgress();
}
renderProgress();

// ===== Knowledge Accordion =====
function loadKPState(){
  return JSON.parse(localStorage.getItem('ai-dash-kp') || '{}');
}
function saveKPState(s){
  localStorage.setItem('ai-dash-kp', JSON.stringify(s));
}
function renderAccordion(){
  const kpState = loadKPState();
  const wrap = document.getElementById('accordionWrap');
  wrap.innerHTML = stages.map(s => {
    const kpHTML = s.kps.map((kp, i) => {
      const key = s.id + '-' + i;
      const st = kpState[key] || 0;
      return `<span class="kp-tag" data-status="${st}" data-key="${key}" onclick="cycleKP(this)"><span class="kp-dot"></span>${kp} · ${statusLabels[st]}</span>`;
    }).join('');
    return `<div class="accordion">
      <div class="acc-header" onclick="toggleAcc(this)">
        <div class="acc-icon" style="background:${s.color}22;color:${s.color}">${s.icon}</div>
        <div class="acc-title"><h4>阶段${s.id} · ${s.name}</h4><span>${s.weeks} · ${s.kps.length}个知识点</span></div>
        <span class="acc-arrow">▼</span>
      </div>
      <div class="acc-body"><div class="acc-body-inner">${kpHTML}</div></div>
    </div>`;
  }).join('');
}
function toggleAcc(header){
  const body = header.nextElementSibling;
  const isOpen = header.classList.contains('open');
  // close all
  document.querySelectorAll('.acc-header').forEach(h => {
    h.classList.remove('open');
    h.nextElementSibling.style.maxHeight = null;
  });
  if(!isOpen){
    header.classList.add('open');
    body.style.maxHeight = body.scrollHeight + 'px';
  }
}
function cycleKP(el){
  let st = parseInt(el.dataset.status);
  st = (st + 1) % 4;
  el.dataset.status = st;
  el.innerHTML = '<span class="kp-dot"></span>' + el.textContent.split(' · ')[0] + ' · ' + statusLabels[st];
  const kpState = loadKPState();
  kpState[el.dataset.key] = st;
  saveKPState(kpState);
}
renderAccordion();

// ===== Resources =====
function renderResources(){
  const wrap = document.getElementById('resourceList');
  wrap.innerHTML = stages.map(s => {
    const resHTML = s.res.map(r => {
      const srcLabel = r.s === 'bilibili' ? 'B站' : r.s === 'youtube' ? 'YouTube' : '公开课';
      return `<div class="res-item" data-source="${r.s}"><span class="res-src" data-source="${r.s}">${srcLabel}</span><span>${r.n}</span></div>`;
    }).join('');
    return `<div class="resource-group"><h4><span class="rg-dot" style="background:${s.color}"></span>阶段${s.id} · ${s.name}</h4>${resHTML}</div>`;
  }).join('');
}
function filterResources(){
  const val = document.getElementById('resFilter').value;
  document.querySelectorAll('.res-item').forEach(el => {
    if(val === 'all' || el.dataset.source === val) el.classList.remove('hidden');
    else el.classList.add('hidden');
  });
}
renderResources();

function renderTimeline(){
  const wrap = document.getElementById('timelineWrap');
  wrap.innerHTML = stages.map(s => {
    return `<div class="tl-node">
      <div class="tl-dot" style="background:${s.color}"></div>
      <div class="tl-card">
        <div class="tl-week" style="color:${s.color}">${s.weeks}</div>
        <div class="tl-name">${s.icon} 阶段${s.id} · ${s.name}</div>
        <div class="tl-milestone">🏁 ${s.milestone}</div>
        <div class="tl-daily">📊 日均 ${s.daily}</div>
      </div>
    </div>`;
  }).join('');
}
